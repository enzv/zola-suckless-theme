<figure>
  <video controls preload="metadata">
    <source src="{{ src }}"{% if mime %} type="{{ mime }}"{% endif %}>
    <a href="{{ src }}">{{ fallback | default(value=src) }}</a>
  </video>
  {% if caption %}
  <figcaption>{{ caption | markdown(inline=true) | safe }}</figcaption>
  {% endif %}
</figure>
